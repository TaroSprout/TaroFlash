name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment to deploy to (staging or production)
        required: true
        type: string
      skip_smoke:
        required: false
        type: boolean
        default: false
      force_frontend:
        required: false
        type: boolean
        default: false
      force_migrations:
        required: false
        type: boolean
        default: false
      force_functions:
        required: false
        type: boolean
        default: false
      force_config:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to deploy to
        required: true
        type: choice
        options: [staging, production]
      skip_smoke:
        type: boolean
        default: false
      force_frontend:
        type: boolean
        default: false
      force_migrations:
        type: boolean
        default: false
      force_functions:
        type: boolean
        default: false
      force_config:
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      functions: ${{ steps.filter.outputs.functions }}
      config: ${{ steps.filter.outputs.config }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve diff base
        id: base
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # PR-triggered staging deploy → leave empty so paths-filter uses PR base.
        # Release / manual deploy     → previous release tag (or empty for first deploy).
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=" >> $GITHUB_OUTPUT
          else
            PREV=$(gh release list --limit 2 --json tagName --jq '.[1].tagName // ""')
            echo "ref=$PREV" >> $GITHUB_OUTPUT
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.base.outputs.ref }}
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'tsconfig*.json'
              - 'netlify.toml'
            migrations:
              - 'supabase/migrations/**'
            functions:
              - 'supabase/functions/**'
            config:
              - 'supabase/config.toml'

  e2e-smoke:
    name: E2E smoke
    needs: [detect-changes]
    if: |
      !inputs.skip_smoke && (
        needs.detect-changes.outputs.frontend == 'true' || inputs.force_frontend ||
        needs.detect-changes.outputs.migrations == 'true' || inputs.force_migrations ||
        needs.detect-changes.outputs.functions == 'true' || inputs.force_functions
      )
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  build:
    name: Build frontend
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true' || inputs.force_frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Setup Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Build
        run: doppler run -- pnpm run build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  migrate:
    name: DB migrations
    needs: [detect-changes, e2e-smoke]
    if: |
      always() &&
      (needs.e2e-smoke.result == 'success' || needs.e2e-smoke.result == 'skipped') &&
      (needs.detect-changes.outputs.migrations == 'true' || inputs.force_migrations)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run migrations
        run: |
          doppler run -- supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }} --password "$(doppler secrets get SUPABASE_DB_PASSWORD --plain)"
          doppler run -- supabase migration up --linked
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  functions:
    name: Deploy edge functions
    needs: [detect-changes, e2e-smoke, migrate]
    if: |
      always() &&
      (needs.e2e-smoke.result == 'success' || needs.e2e-smoke.result == 'skipped') &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      (needs.detect-changes.outputs.functions == 'true' || inputs.force_functions)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Link project
        run: doppler run -- supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }} --password "$(doppler secrets get SUPABASE_DB_PASSWORD --plain)"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Set edge function secrets
        run: |
          doppler run -- supabase secrets set \
            STRIPE_SECRET_KEY="$(doppler secrets get STRIPE_SECRET_KEY --plain)" \
            STRIPE_WEBHOOK_SECRET="$(doppler secrets get STRIPE_WEBHOOK_SECRET --plain)" \
            --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy functions
        run: doppler run -- supabase functions deploy --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  config:
    name: Push Supabase config
    needs: [detect-changes]
    if: needs.detect-changes.outputs.config == 'true' || inputs.force_config
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Link project
        run: doppler run -- supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }} --password "$(doppler secrets get SUPABASE_DB_PASSWORD --plain)"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Push config
        run: doppler run -- supabase config push --yes
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  frontend:
    name: Deploy frontend
    needs: [build, e2e-smoke, migrate, functions]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.e2e-smoke.result == 'success' || needs.e2e-smoke.result == 'skipped') &&
      needs.migrate.result != 'failure' &&
      needs.functions.result != 'failure'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Netlify
        run: npx --yes netlify-cli deploy --dir=dist --prod --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}

  tag-release:
    name: Tag + release (semantic-release)
    needs: [migrate, functions, config, frontend]
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.environment == 'production' &&
      needs.migrate.result != 'failure' &&
      needs.functions.result != 'failure' &&
      needs.config.result != 'failure' &&
      needs.frontend.result != 'failure' &&
      (needs.migrate.result == 'success' || needs.functions.result == 'success' || needs.config.result == 'success' || needs.frontend.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node

      - name: Run semantic-release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
