<!doctype html>
<html lang="en" class="h-full">
  <head>
    <title>%VITE_APP_TITLE%</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="description" content="A Spaced Repetition Flashcard App" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" sizes="180x180" />
    <meta name="theme-color" content="#f3f1ea" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="google-site-verification" content="RYCZPlH19cDxgk_7N4FFqu8RVBS2CbUImLfmFFlFpL4" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tilt+Neon&display=swap" />

    <!-- Pre-paint mode stamp. The theme store only loads in App.vue's onMounted,
         so without this a dark-mode user gets a guaranteed flash of light theme.
         Mirrors the store's resolution exactly (src/stores/theme.ts): the
         'app-theme' key holds 'light' | 'dark' | 'system', absent means system.
         Writes data-theme alongside data-mode because the legacy theme layer
         still keys off it. -->
    <script>
      ;(function () {
        var saved = null
        try {
          saved = localStorage.getItem('app-theme')
        } catch (e) {
          /* storage blocked — fall through to system */
        }
        var system_dark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var resolved = !saved || saved === 'system' ? (system_dark ? 'dark' : 'light') : saved
        document.documentElement.setAttribute('data-mode', resolved)
        document.documentElement.setAttribute('data-theme', resolved)
      })()
    </script>
  </head>
  <body class="bg-surface h-full">
    <div id="app" class="flex flex-col md:items-center h-full"></div>

    <section
      data-testid="app-modal-container"
      class="pointer-events-none touch-none fixed inset-0 z-100 flex items-center justify-center"
    ></section>
    <section
      notice-toast-container
      class="pointer-events-none touch-none fixed inset-0 z-100 flex flex-col items-center xs:items-end gap-2 p-4 pt-4 xs:pt-(--nav-height,4rem)"
    ></section>
    <section
      notice-panel-container
      class="pointer-events-none touch-none fixed inset-0 z-101 flex items-center justify-center px-4"
    ></section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
